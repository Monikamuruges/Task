<!DOCTYPE html>
<html>
<head>
    <title>Become a Pet Sitter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="bg-gray-50">

    <div class="container mx-auto py-10 max-w-xl">

        <h1 class="text-3xl font-bold mb-6 text-center">
            Become a Pet Sitter
        </h1>

        <form id="sitterForm" class="bg-white p-6 rounded-xl shadow space-y-4">

            <input type="text" placeholder="Full Name"
                class="w-full border p-3 rounded-lg">

            <input type="email" placeholder="Email"
                class="w-full border p-3 rounded-lg">

            <input type="text" placeholder="Experience"
                class="w-full border p-3 rounded-lg">

            <button class="w-full bg-blue-600 text-white py-3 rounded-lg">
                Submit Application
            </button>

        </form>

    </div>
    <script>
    document.getElementById("sitterForm").addEventListener("submit", function (e) {
    e.preventDefault(); 

    alert("Application submitted successfully!");

    this.reset(); 
});
</script>

    <script src="./js/script.js"></script>
    
</body>
</html>
